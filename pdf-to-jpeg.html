<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDFをJPEGに変換 | 無料ブラウザツール</title>
  <meta name="description" content="PDFの各ページをJPEG画像に変換できる無料ツールです。ファイルはサーバーへ送信せず、ブラウザ内で処理します。" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://convenientfunction.com/pdf-to-jpeg.html" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

  <meta property="og:title" content="PDFをJPEGに変換 | 無料ブラウザツール" />
  <meta property="og:description" content="PDFを選ぶだけで各ページをJPEG画像として保存できます。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://convenientfunction.com/pdf-to-jpeg.html" />
  <meta property="og:site_name" content="便利サイト" />
  <meta name="twitter:card" content="summary" />
  <meta name="theme-color" content="#0f766e" />

  <link rel="stylesheet" href="style.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6659521652915815"
     crossorigin="anonymous"></script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "PDFをJPEGに変換",
    "url": "https://convenientfunction.com/pdf-to-jpeg.html",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Any",
    "inLanguage": "ja",
    "description": "PDFの各ページをJPEG画像に変換できる無料ツールです。",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "JPY"
    }
  }
  </script>
</head>
<body class="tool-page">
  <aside class="ad-slot ad-rail ad-rail-left" aria-label="広告"></aside>
  <aside class="ad-slot ad-rail ad-rail-right" aria-label="広告"></aside>

  <header class="site-header compact">
    <nav class="site-nav" aria-label="主要ナビゲーション">
      <a href="./">ホーム</a>
      <a href="memo/">メモ帳</a>
      <a href="pdf-to-jpeg.html" aria-current="page">PDFをJPEGに変換</a>
      <a href="code-editor.html">Webコードエディター</a>
      <a href="privacy.html">プライバシー</a>
    </nav>

    <div class="site-heading">
      <p class="eyebrow">PDF converter</p>
      <h1>PDFをJPEGに変換</h1>
      <p>PDFの各ページをJPEG画像として保存できます。処理はブラウザ内で行います。</p>
    </div>
  </header>

  <main class="converter-main">
    <section class="panel converter-panel" aria-labelledby="converter-heading">
      <h2 id="converter-heading">変換するPDF</h2>
      <label class="drop-area" id="dropArea" for="pdfInput">
        <span>
          <strong>PDFファイルを選択</strong>
          クリックして選ぶか、ここにPDFをドラッグ&ドロップしてください。
        </span>
      </label>
      <input id="pdfInput" type="file" accept="application/pdf,.pdf" />
      <p class="tool-note">変換できるPDFは50MB以下、80ページまでです。大きなファイルは端末に負荷がかかるため制限しています。</p>

      <div class="controls">
        <label>
          画質
          <select id="qualitySelect">
            <option value="0.92" selected>高画質</option>
            <option value="0.82">標準</option>
            <option value="0.7">軽量</option>
          </select>
        </label>

        <label>
          解像度
          <select id="scaleSelect">
            <option value="1.5">低め</option>
            <option value="2" selected>標準</option>
            <option value="3">高解像度</option>
          </select>
        </label>

        <label>
          実行
          <span class="button-row">
            <button id="convertButton" type="button" disabled>JPEGに変換</button>
            <button id="cancelButton" class="secondary-button" type="button" disabled>中止</button>
          </span>
        </label>
      </div>
    </section>

    <p class="status" id="status" role="status" aria-live="polite">PDFファイルを選択してください。</p>
    <button class="download-all" id="downloadAllButton" type="button" disabled>すべてダウンロード</button>
    <section class="results" id="results" aria-label="変換結果"></section>
  </main>

  <canvas id="workCanvas"></canvas>

  <script type="module">
    import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@6.1.200/build/pdf.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@6.1.200/build/pdf.worker.mjs";

    const pdfInput = document.getElementById("pdfInput");
    const dropArea = document.getElementById("dropArea");
    const qualitySelect = document.getElementById("qualitySelect");
    const scaleSelect = document.getElementById("scaleSelect");
    const convertButton = document.getElementById("convertButton");
    const cancelButton = document.getElementById("cancelButton");
    const downloadAllButton = document.getElementById("downloadAllButton");
    const statusText = document.getElementById("status");
    const results = document.getElementById("results");
    const canvas = document.getElementById("workCanvas");
    const context = canvas.getContext("2d");
    const maxFileSizeMb = 50;
    const maxFileSizeBytes = maxFileSizeMb * 1024 * 1024;
    const maxPageCount = 80;

    let selectedFile = null;
    let convertedImages = [];
    let isCancelled = false;

    function setStatus(message) {
      statusText.textContent = message;
    }

    function sanitizeFileName(name) {
      return name
        .replace(/\.pdf$/i, "")
        .replace(/[\\/:*?"<>|]/g, "-")
        .trim() || "converted";
    }

    function resetResults() {
      convertedImages = [];
      results.innerHTML = "";
      downloadAllButton.disabled = true;
    }

    function clearSelectedFile(message) {
      selectedFile = null;
      pdfInput.value = "";
      convertButton.disabled = true;
      cancelButton.disabled = true;
      resetResults();
      setStatus(message);
    }

    function setFile(file) {
      if (!file) return;

      if (file.type !== "application/pdf" && !file.name.toLowerCase().endsWith(".pdf")) {
        clearSelectedFile("PDFファイルを選択してください。");
        return;
      }

      if (file.size > maxFileSizeBytes) {
        clearSelectedFile(`PDFファイルは${maxFileSizeMb}MB以下にしてください。`);
        return;
      }

      selectedFile = file;
      isCancelled = false;
      convertButton.disabled = false;
      cancelButton.disabled = true;
      resetResults();
      setStatus(`${file.name} を選択しました。最大${maxPageCount}ページまで変換できます。`);
    }

    async function renderPageToJpeg(pdf, pageNumber, scale, quality, baseName) {
      const page = await pdf.getPage(pageNumber);
      const viewport = page.getViewport({ scale });
      const outputScale = window.devicePixelRatio || 1;

      canvas.width = Math.floor(viewport.width * outputScale);
      canvas.height = Math.floor(viewport.height * outputScale);
      canvas.style.width = `${Math.floor(viewport.width)}px`;
      canvas.style.height = `${Math.floor(viewport.height)}px`;

      context.fillStyle = "#ffffff";
      context.fillRect(0, 0, canvas.width, canvas.height);

      await page.render({
        canvasContext: context,
        viewport,
        transform: outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null
      }).promise;

      const dataUrl = canvas.toDataURL("image/jpeg", quality);
      const fileName = `${baseName}-page-${String(pageNumber).padStart(2, "0")}.jpg`;

      return {
        dataUrl,
        fileName,
        pageNumber,
        width: canvas.width,
        height: canvas.height
      };
    }

    function addResultCard(image) {
      const card = document.createElement("article");
      card.className = "result-card";

      const preview = document.createElement("img");
      preview.src = image.dataUrl;
      preview.alt = `PDF ${image.pageNumber}ページ目のJPEGプレビュー`;

      const info = document.createElement("div");
      const title = document.createElement("h2");
      title.textContent = `${image.pageNumber}ページ目`;

      const detail = document.createElement("p");
      detail.textContent = `${image.width} x ${image.height}px / ${image.fileName}`;

      const link = document.createElement("a");
      link.href = image.dataUrl;
      link.download = image.fileName;

      const button = document.createElement("button");
      button.type = "button";
      button.textContent = "ダウンロード";

      link.appendChild(button);
      info.appendChild(title);
      info.appendChild(detail);
      card.appendChild(preview);
      card.appendChild(info);
      card.appendChild(link);
      results.appendChild(card);
    }

    async function convertPdf() {
      if (!selectedFile) return;

      resetResults();
      isCancelled = false;
      convertButton.disabled = true;
      cancelButton.disabled = false;
      setStatus("PDFを読み込んでいます...");

      try {
        const pdfData = new Uint8Array(await selectedFile.arrayBuffer());
        const pdf = await pdfjsLib.getDocument({ data: pdfData }).promise;
        const scale = Number(scaleSelect.value);
        const quality = Number(qualitySelect.value);
        const baseName = sanitizeFileName(selectedFile.name);

        if (pdf.numPages > maxPageCount) {
          setStatus(`ページ数が多すぎます。${maxPageCount}ページ以下のPDFを選択してください。`);
          return;
        }

        setStatus(`${pdf.numPages}ページを変換しています...`);

        for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
          if (isCancelled) break;

          setStatus(`${pageNumber} / ${pdf.numPages} ページを変換中...`);
          const image = await renderPageToJpeg(pdf, pageNumber, scale, quality, baseName);

          if (isCancelled) break;

          convertedImages.push(image);
          addResultCard(image);
        }

        downloadAllButton.disabled = convertedImages.length === 0;

        if (isCancelled) {
          setStatus(`変換を中止しました。${convertedImages.length}枚のJPEGを作成済みです。`);
          return;
        }

        setStatus(`変換が完了しました。${convertedImages.length}枚のJPEGを作成しました。`);
      } catch (error) {
        if (isCancelled) {
          setStatus(`変換を中止しました。${convertedImages.length}枚のJPEGを作成済みです。`);
        } else {
          setStatus("変換できませんでした。PDFファイルを確認してください。");
        }
      } finally {
        convertButton.disabled = !selectedFile;
        cancelButton.disabled = true;
      }
    }

    function downloadAll() {
      convertedImages.forEach((image, index) => {
        setTimeout(() => {
          const link = document.createElement("a");
          link.href = image.dataUrl;
          link.download = image.fileName;
          document.body.appendChild(link);
          link.click();
          link.remove();
        }, index * 250);
      });
    }

    pdfInput.addEventListener("change", () => {
      setFile(pdfInput.files[0]);
    });

    dropArea.addEventListener("dragover", (event) => {
      event.preventDefault();
      dropArea.classList.add("dragover");
    });

    dropArea.addEventListener("dragleave", () => {
      dropArea.classList.remove("dragover");
    });

    dropArea.addEventListener("drop", (event) => {
      event.preventDefault();
      dropArea.classList.remove("dragover");
      setFile(event.dataTransfer.files[0]);
    });

    convertButton.addEventListener("click", convertPdf);
    cancelButton.addEventListener("click", () => {
      isCancelled = true;
      cancelButton.disabled = true;
      setStatus("変換を中止しています...");
    });
    downloadAllButton.addEventListener("click", downloadAll);
  </script>
</body>
</html>
